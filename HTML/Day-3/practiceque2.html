<!DOCTYPE html>
<html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lists in html</title>
 </head>
  <body>
   <form action="/server">
    <input type="checkbox" name="age" id="age" />
    <label for="age"> I am 18+ </label>
    <div>
      Choose your subject
      <input type="radio" name="subjects" id="maths" />
      <label for="subjects">maths</label>
      <input type="radio" name="subject"  id="english" />
      <label for="subject">english</label>
      <input type="radio" name="subject"  id="hindi"  />
      <label for="subject">hindi</label>
    </div>
    <div>
      Choose your profession
      <select name="profession" id="profession" >
        <option value="student" >Student</option>
        <option value="dev">Developer</option>
    </div>
    <button>submit</button>
     </form>
  </body>
  </html>
